name: Release meta-package to PyPI

# Triggers only on tags in the meta-v* namespace, separate from the front-door
# repo's historical v0.1.0a* tags (which were the legacy generator releases,
# now superseded by nthlayer-generate's v1.0.0+ tags). The meta-package is
# the only thing this repo publishes to PyPI.

on:
  push:
    tags:
      - 'meta-v*'
  workflow_dispatch:  # manual fallback

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write  # Required for trusted publishing

    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Set up Python
        run: uv python install 3.11

      - name: Build meta-package
        working-directory: meta-package
        run: uv build

      - name: Verify package
        working-directory: meta-package
        run: uvx twine check dist/*

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: meta-package/dist/
        # Uses trusted publishing — configure at:
        # https://pypi.org/manage/project/nthlayer/settings/publishing/
