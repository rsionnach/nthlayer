# Central policy defaults for the organization.
# Per-service overrides go in PolicyRules resources within service YAMLs.

rules:
  - name: require-ownership
    type: required_fields
    severity: error
    description: All services must have ownership info
    params:
      fields:
        - ownership.team
        - ownership.runbook

  - name: critical-tier-requirements
    type: tier_constraint
    severity: error
    description: Critical services need SLOs and deployment gates
    params:
      tier: critical
      min_slos: 2
      require_deployment_gates: true
      require_ownership: true

  - name: high-tier-requirements
    type: tier_constraint
    severity: warning
    description: High-tier services should have SLOs
    params:
      tier: high
      min_slos: 1

  - name: critical-deps-need-slos
    type: dependency_rule
    severity: warning
    description: Critical dependencies should declare SLO expectations
    params:
      require_critical_deps_have_slo: true
