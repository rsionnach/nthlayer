# Azure Alerting Rules
# Source: https://github.com/samber/awesome-prometheus-alerts
#
# Auto-synced by NthLayer. Do not edit manually.
# Run: python scripts/sync_awesome_alerts.py

groups:
- name: azure
  rules:
  - alert: AzureExporterRequestErrors
    expr: increase(azurerm_stats_metric_requests{result="error"}[15m]) > 5
    for: 1m
    labels:
      severity: warning
    annotations:
      summary: Azure exporter request errors (instance {{ $labels.instance }})
      description: "Azure metrics exporter on {{ $labels.instance }} has {{ $value }} API request errors in the last 15 minutes.\n\
        \  VALUE = {{ $value }}\n  LABELS = {{ $labels }}"
  - alert: AzureExporterHighErrorRate
    expr: sum by (instance) (rate(azurerm_stats_metric_requests{result="error"}[5m])) / sum by (instance) (rate(azurerm_stats_metric_requests[5m]))
      * 100 > 10 and sum by (instance) (rate(azurerm_stats_metric_requests[5m])) > 0
    for: 5m
    labels:
      severity: warning
    annotations:
      summary: Azure exporter high error rate (instance {{ $labels.instance }})
      description: "Azure metrics exporter on {{ $labels.instance }} has an error rate above 10% ({{ $value }}%).\n  VALUE\
        \ = {{ $value }}\n  LABELS = {{ $labels }}"
  - alert: AzureApiReadRateLimitApproaching
    expr: azurerm_api_ratelimit{type="read"} < 100
    for: 1m
    labels:
      severity: warning
    annotations:
      summary: Azure API read rate limit approaching (instance {{ $labels.instance }})
      description: "Azure API read rate limit for subscription {{ $labels.subscriptionID }} is running low ({{ $value }} remaining).\n\
        \  VALUE = {{ $value }}\n  LABELS = {{ $labels }}"
  - alert: AzureApiWriteRateLimitApproaching
    expr: azurerm_api_ratelimit{type="write"} < 50
    for: 1m
    labels:
      severity: warning
    annotations:
      summary: Azure API write rate limit approaching (instance {{ $labels.instance }})
      description: "Azure API write rate limit for subscription {{ $labels.subscriptionID }} is running low ({{ $value }}\
        \ remaining).\n  VALUE = {{ $value }}\n  LABELS = {{ $labels }}"
  - alert: AzureExporterSlowCollection
    expr: azurerm_stats_metric_collecttime > 300
    for: 5m
    labels:
      severity: warning
    annotations:
      summary: Azure exporter slow collection (instance {{ $labels.instance }})
      description: "Azure metrics exporter on {{ $labels.instance }} metric collection is taking more than 5 minutes ({{ $value\
        \ }}s).\n  VALUE = {{ $value }}\n  LABELS = {{ $labels }}"
