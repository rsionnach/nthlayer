# Wireguard Alerting Rules
# Source: https://github.com/samber/awesome-prometheus-alerts
#
# Auto-synced by NthLayer. Do not edit manually.
# Run: python scripts/sync_awesome_alerts.py

groups:
- name: wireguard
  rules:
  - alert: WireguardPeerHandshakeTooOld
    expr: time() - wireguard_latest_handshake_seconds > 300 and wireguard_latest_handshake_seconds > 0
    for: 2m
    labels:
      severity: warning
    annotations:
      summary: WireGuard peer handshake too old (instance {{ $labels.instance }})
      description: "WireGuard peer {{ $labels.public_key }} on interface {{ $labels.interface }} has not had a handshake for\
        \ over 5 minutes. The tunnel may be down.\n  VALUE = {{ $value }}\n  LABELS = {{ $labels }}"
  - alert: WireguardPeerHandshakeNeverEstablished
    expr: wireguard_latest_handshake_seconds == 0
    for: 5m
    labels:
      severity: critical
    annotations:
      summary: WireGuard peer handshake never established (instance {{ $labels.instance }})
      description: "WireGuard peer {{ $labels.public_key }} on interface {{ $labels.interface }} has never completed a handshake.\
        \ Check peer configuration and network connectivity.\n  VALUE = {{ $value }}\n  LABELS = {{ $labels }}"
  - alert: WireguardNoTrafficOnPeer
    expr: (rate(wireguard_sent_bytes_total[15m]) + rate(wireguard_received_bytes_total[15m])) == 0 and wireguard_latest_handshake_seconds
      > 0 and (time() - wireguard_latest_handshake_seconds) < 300
    for: 15m
    labels:
      severity: warning
    annotations:
      summary: WireGuard no traffic on peer (instance {{ $labels.instance }})
      description: "WireGuard peer {{ $labels.public_key }} on interface {{ $labels.interface }} has had no traffic for 15\
        \ minutes despite an active handshake.\n  VALUE = {{ $value }}\n  LABELS = {{ $labels }}"
