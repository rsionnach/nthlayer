# Snmp Alerting Rules
# Source: https://github.com/samber/awesome-prometheus-alerts
#
# Auto-synced by NthLayer. Do not edit manually.
# Run: python scripts/sync_awesome_alerts.py

groups:
- name: snmp
  rules:
  - alert: SnmpTargetDown
    expr: up{job=~"snmp.*"} == 0
    for: 5m
    labels:
      severity: critical
    annotations:
      summary: SNMP target down (instance {{ $labels.instance }})
      description: "SNMP device {{ $labels.instance }} is unreachable.\n  VALUE = {{ $value }}\n  LABELS = {{ $labels }}"
  - alert: SnmpInterfaceDown
    expr: (ifOperStatus{job=~"snmp.*"} == 2) and on(instance, job, ifIndex) (ifAdminStatus{job=~"snmp.*"} == 1)
    for: 2m
    labels:
      severity: critical
    annotations:
      summary: SNMP interface down (instance {{ $labels.instance }})
      description: "Interface {{ $labels.ifDescr }} on {{ $labels.instance }} is operationally down while administratively\
        \ up.\n  VALUE = {{ $value }}\n  LABELS = {{ $labels }}"
  - alert: SnmpInterfaceHighInboundErrorRate
    expr: rate(ifInErrors{job=~"snmp.*"}[5m]) / (rate(ifHCInUcastPkts{job=~"snmp.*"}[5m]) + rate(ifHCInBroadcastPkts{job=~"snmp.*"}[5m])
      + rate(ifHCInMulticastPkts{job=~"snmp.*"}[5m])) > 0.05 and (rate(ifHCInUcastPkts{job=~"snmp.*"}[5m]) + rate(ifHCInBroadcastPkts{job=~"snmp.*"}[5m])
      + rate(ifHCInMulticastPkts{job=~"snmp.*"}[5m])) > 0
    for: 5m
    labels:
      severity: warning
    annotations:
      summary: SNMP interface high inbound error rate (instance {{ $labels.instance }})
      description: "Interface {{ $labels.ifDescr }} on {{ $labels.instance }} has an inbound error rate above 5%.\n  VALUE\
        \ = {{ $value }}\n  LABELS = {{ $labels }}"
  - alert: SnmpInterfaceHighOutboundErrorRate
    expr: rate(ifOutErrors{job=~"snmp.*"}[5m]) / (rate(ifHCOutUcastPkts{job=~"snmp.*"}[5m]) + rate(ifHCOutBroadcastPkts{job=~"snmp.*"}[5m])
      + rate(ifHCOutMulticastPkts{job=~"snmp.*"}[5m])) > 0.05 and (rate(ifHCOutUcastPkts{job=~"snmp.*"}[5m]) + rate(ifHCOutBroadcastPkts{job=~"snmp.*"}[5m])
      + rate(ifHCOutMulticastPkts{job=~"snmp.*"}[5m])) > 0
    for: 5m
    labels:
      severity: warning
    annotations:
      summary: SNMP interface high outbound error rate (instance {{ $labels.instance }})
      description: "Interface {{ $labels.ifDescr }} on {{ $labels.instance }} has an outbound error rate above 5%.\n  VALUE\
        \ = {{ $value }}\n  LABELS = {{ $labels }}"
  - alert: SnmpInterfaceHighBandwidthUsageInbound
    expr: rate(ifHCInOctets{job=~"snmp.*"}[5m]) * 8 / ifSpeed > 0.80 and ifSpeed > 0
    for: 15m
    labels:
      severity: warning
    annotations:
      summary: SNMP interface high bandwidth usage inbound (instance {{ $labels.instance }})
      description: "Interface {{ $labels.ifDescr }} on {{ $labels.instance }} inbound utilization is above 80%.\n  VALUE =\
        \ {{ $value }}\n  LABELS = {{ $labels }}"
  - alert: SnmpInterfaceHighBandwidthUsageOutbound
    expr: rate(ifHCOutOctets{job=~"snmp.*"}[5m]) * 8 / ifSpeed > 0.80 and ifSpeed > 0
    for: 15m
    labels:
      severity: warning
    annotations:
      summary: SNMP interface high bandwidth usage outbound (instance {{ $labels.instance }})
      description: "Interface {{ $labels.ifDescr }} on {{ $labels.instance }} outbound utilization is above 80%.\n  VALUE\
        \ = {{ $value }}\n  LABELS = {{ $labels }}"
  - alert: SnmpDeviceRestarted
    expr: sysUpTime / 100 < 300
    for: 1m
    labels:
      severity: info
    annotations:
      summary: SNMP device restarted (instance {{ $labels.instance }})
      description: "SNMP device {{ $labels.instance }} has restarted (uptime < 5 minutes).\n  VALUE = {{ $value }}\n  LABELS\
        \ = {{ $labels }}"
