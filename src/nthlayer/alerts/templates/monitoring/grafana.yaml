    labels:
      severity: critical
    annotations:
      summary: Mimir alertmanager persist state failing (instance {{ $labels.instance }})
      description: "Mimir alertmanager {{ $labels.job }} is failing to persist state ({{ $value | humanize }}/s).\n  VALUE\
