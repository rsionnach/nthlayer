# Grafana Alerting Rules
# Source: https://github.com/samber/awesome-prometheus-alerts
#
# Auto-synced by NthLayer. Do not edit manually.
# Run: python scripts/sync_awesome_alerts.py

groups:
- name: grafana
  rules:
  - alert: TempoDistributorUnhealthy
    expr: max by (job) (tempo_ring_members{state="Unhealthy", name="distributor"}) > 0
    for: 15m
    labels:
      severity: warning
    annotations:
      summary: Tempo distributor unhealthy (instance {{ $labels.instance }})
      description: "Tempo has {{ $value }} unhealthy distributor(s).\n  VALUE = {{ $value }}\n  LABELS = {{ $labels }}"
  - alert: TempoLiveStoreUnhealthy
    expr: max by (job) (tempo_ring_members{state="Unhealthy", name="live-store"}) > 0
    for: 15m
    labels:
      severity: critical
    annotations:
      summary: Tempo live store unhealthy (instance {{ $labels.instance }})
      description: "Tempo has {{ $value }} unhealthy live store(s).\n  VALUE = {{ $value }}\n  LABELS = {{ $labels }}"
  - alert: TempoMetricsGeneratorUnhealthy
    expr: max by (job) (tempo_ring_members{state="Unhealthy", name="metrics-generator"}) > 0
    for: 15m
    labels:
      severity: critical
    annotations:
      summary: Tempo metrics generator unhealthy (instance {{ $labels.instance }})
      description: "Tempo has {{ $value }} unhealthy metrics generator(s).\n  VALUE = {{ $value }}\n  LABELS = {{ $labels\
        \ }}"
  - alert: TempoCompactionsFailing
    expr: sum by (job) (increase(tempodb_compaction_errors_total[1h])) > 2 and sum by (job) (increase(tempodb_compaction_errors_total[5m]))
      > 0
    for: 1h
    labels:
      severity: critical
    annotations:
      summary: Tempo compactions failing (instance {{ $labels.instance }})
      description: "{{ $value }} compactions have failed in the past hour.\n  VALUE = {{ $value }}\n  LABELS = {{ $labels\
        \ }}"
  - alert: TempoPollsFailing
    expr: sum by (job) (increase(tempodb_blocklist_poll_errors_total[1h])) > 2 and sum by (job) (increase(tempodb_blocklist_poll_errors_total[5m]))
      > 0
    for: 1m
    labels:
      severity: critical
    annotations:
      summary: Tempo polls failing (instance {{ $labels.instance }})
      description: "{{ $value }} blocklist polls have failed in the past hour.\n  VALUE = {{ $value }}\n  LABELS = {{ $labels\
        \ }}"
  - alert: TempoTenantIndexFailures
    expr: sum by (job) (increase(tempodb_blocklist_tenant_index_errors_total[1h])) > 2 and sum by (job) (increase(tempodb_blocklist_tenant_index_errors_total[5m]))
      > 0
    for: 1m
    labels:
      severity: critical
    annotations:
      summary: Tempo tenant index failures (instance {{ $labels.instance }})
      description: "{{ $value }} tenant index failures in the past hour.\n  VALUE = {{ $value }}\n  LABELS = {{ $labels }}"
  - alert: TempoNoTenantIndexBuilders
    expr: sum by (tenant) (tempodb_blocklist_tenant_index_builder) == 0 and on() max(tempodb_blocklist_length) > 0
    for: 5m
    labels:
      severity: critical
    annotations:
      summary: Tempo no tenant index builders (instance {{ $labels.instance }})
      description: "No tenant index builders for tenant {{ $labels.tenant }}. Tenant index will quickly become stale.\n  VALUE\
        \ = {{ $value }}\n  LABELS = {{ $labels }}"
  - alert: TempoTenantIndexTooOld
    expr: max by (tenant) (tempodb_blocklist_tenant_index_age_seconds) > 600
    for: 5m
    labels:
      severity: critical
    annotations:
      summary: Tempo tenant index too old (instance {{ $labels.instance }})
      description: "Tenant index for {{ $labels.tenant }} is {{ $value }}s old.\n  VALUE = {{ $value }}\n  LABELS = {{ $labels\
        \ }}"
  - alert: TempoBlockListRisingQuickly
    expr: (avg(tempodb_blocklist_length) / avg(tempodb_blocklist_length offset 7d) - 1) * 100 > 40 and avg(tempodb_blocklist_length
      offset 7d) > 0
    for: 15m
    labels:
      severity: critical
    annotations:
      summary: Tempo block list rising quickly (instance {{ $labels.instance }})
      description: "Tempo blocklist length is up {{ printf \"%.0f\" $value }}% over the last 7 days. Consider scaling compactors.\n\
        \  VALUE = {{ $value }}\n  LABELS = {{ $labels }}"
  - alert: TempoBadOverrides
    expr: sum by (job) (tempo_runtime_config_last_reload_successful == 0) > 0
    for: 15m
    labels:
      severity: critical
    annotations:
      summary: Tempo bad overrides (instance {{ $labels.instance }})
      description: "{{ $labels.job }} failed to reload runtime overrides.\n  VALUE = {{ $value }}\n  LABELS = {{ $labels }}"
  - alert: TempoUserConfigurableOverridesReloadFailing
    expr: sum by (job) (increase(tempo_overrides_user_configurable_overrides_reload_failed_total[1h])) > 5 and sum by (job)
      (increase(tempo_overrides_user_configurable_overrides_reload_failed_total[5m])) > 0
    for: 1m
    labels:
      severity: critical
    annotations:
      summary: Tempo user configurable overrides reload failing (instance {{ $labels.instance }})
      description: "{{ $value }} user-configurable overrides reloads have failed in the past hour.\n  VALUE = {{ $value }}\n\
        \  LABELS = {{ $labels }}"
  - alert: TempoCompactionTooManyOutstandingBlocksWarning
    expr: sum by (instance) (tempodb_compaction_outstanding_blocks) > 100
    for: 6h
    labels:
      severity: warning
    annotations:
      summary: Tempo compaction too many outstanding blocks warning (instance {{ $labels.instance }})
      description: "There are too many outstanding compaction blocks for {{ $labels.instance }}. Consider increasing compactor\
        \ resources.\n  VALUE = {{ $value }}\n  LABELS = {{ $labels }}"
  - alert: TempoCompactionTooManyOutstandingBlocksCritical
    expr: sum by (instance) (tempodb_compaction_outstanding_blocks) > 250
    for: 24h
    labels:
      severity: critical
    annotations:
      summary: Tempo compaction too many outstanding blocks critical (instance {{ $labels.instance }})
      description: "There are too many outstanding compaction blocks for {{ $labels.instance }}. Increase compactor resources\
        \ immediately.\n  VALUE = {{ $value }}\n  LABELS = {{ $labels }}"
  - alert: TempoDistributorUsageTrackerErrors
    expr: sum by (job, reason) (rate(tempo_distributor_usage_tracker_errors_total[5m])) > 0
    for: 30m
    labels:
      severity: critical
    annotations:
      summary: Tempo distributor usage tracker errors (instance {{ $labels.instance }})
      description: "Tempo distributor usage tracker errors for {{ $labels.job }} at {{ $value | humanize }}/s (reason {{ $labels.reason\
        \ }}).\n  VALUE = {{ $value }}\n  LABELS = {{ $labels }}"
  - alert: TempoMetricsGeneratorProcessorUpdatesFailing
    expr: sum by (job) (increase(tempo_metrics_generator_active_processors_update_failed_total[5m])) > 0
    for: 15m
    labels:
      severity: critical
    annotations:
      summary: Tempo metrics generator processor updates failing (instance {{ $labels.instance }})
      description: "Tempo metrics generator processor updates are failing for {{ $labels.job }} ({{ $value }} failures in\
        \ 5m).\n  VALUE = {{ $value }}\n  LABELS = {{ $labels }}"
  - alert: TempoMetricsGeneratorServiceGraphsDroppingSpans
    expr: 100 * sum by (job) (rate(tempo_metrics_generator_processor_service_graphs_dropped_spans[5m])) / sum by (job) (rate(tempo_metrics_generator_spans_received_total[5m]))
      > 0.5 and sum by (job) (rate(tempo_metrics_generator_spans_received_total[5m])) > 0
    for: 15m
    labels:
      severity: warning
    annotations:
      summary: Tempo metrics generator service graphs dropping spans (instance {{ $labels.instance }})
      description: "Tempo metrics generator is dropping {{ printf \"%.2f\" $value }}% of spans in service graphs for {{ $labels.job\
        \ }}.\n  VALUE = {{ $value }}\n  LABELS = {{ $labels }}"
  - alert: TempoMetricsGeneratorCollectionsFailing
    expr: sum by (job) (increase(tempo_metrics_generator_registry_collections_failed_total[5m])) > 2
    for: 5m
    labels:
      severity: critical
    annotations:
      summary: Tempo metrics generator collections failing (instance {{ $labels.instance }})
      description: "Tempo metrics generator collections are failing for {{ $labels.job }} ({{ $value }} failures in 5m).\n\
        \  VALUE = {{ $value }}\n  LABELS = {{ $labels }}"
  - alert: TempoMemcachedErrorsElevated
    expr: 100 * sum by (name, job) (rate(tempo_memcache_request_duration_seconds_count{status_code="500"}[5m])) / sum by (name,
      job) (rate(tempo_memcache_request_duration_seconds_count[5m])) > 20 and sum by (name, job) (rate(tempo_memcache_request_duration_seconds_count[5m]))
      > 0
    for: 10m
    labels:
      severity: warning
    annotations:
      summary: Tempo memcached errors elevated (instance {{ $labels.instance }})
      description: "Tempo memcached error rate is {{ printf \"%.2f\" $value }}% for {{ $labels.name }} in {{ $labels.job }}.\n\
        \  VALUE = {{ $value }}\n  LABELS = {{ $labels }}"
  - alert: MimirIngesterUnhealthy
    expr: min by (job) (cortex_ring_members{state="Unhealthy", name="ingester"}) > 0
    for: 15m
    labels:
      severity: critical
    annotations:
      summary: Mimir ingester unhealthy (instance {{ $labels.instance }})
      description: "Mimir has {{ $value }} unhealthy ingester(s) in the ring.\n  VALUE = {{ $value }}\n  LABELS = {{ $labels\
        \ }}"
  - alert: MimirRequestErrors
    expr: 100 * sum by (job, route) (rate(cortex_request_duration_seconds_count{status_code=~"5..", route!~"ready|debug_pprof"}[5m]))
      / sum by (job, route) (rate(cortex_request_duration_seconds_count{route!~"ready|debug_pprof"}[5m])) > 1 and sum by (job,
      route) (rate(cortex_request_duration_seconds_count{route!~"ready|debug_pprof"}[5m])) > 0
    for: 15m
    labels:
      severity: critical
    annotations:
      summary: Mimir request errors (instance {{ $labels.instance }})
      description: "Mimir {{ $labels.job }} {{ $labels.route }} is experiencing {{ printf \"%.2f\" $value }}% errors.\n  VALUE\
        \ = {{ $value }}\n  LABELS = {{ $labels }}"
  - alert: MimirInconsistentRuntimeConfig
    expr: count(count by (job, sha256) (cortex_runtime_config_hash)) without(sha256) > 1
    for: 1h
    labels:
      severity: critical
    annotations:
      summary: Mimir inconsistent runtime config (instance {{ $labels.instance }})
      description: "An inconsistent runtime config file is used across Mimir instances.\n  VALUE = {{ $value }}\n  LABELS\
        \ = {{ $labels }}"
  - alert: MimirBadRuntimeConfig
    expr: sum by (job) (cortex_runtime_config_last_reload_successful == 0) > 0
    for: 5m
    labels:
      severity: critical
    annotations:
      summary: Mimir bad runtime config (instance {{ $labels.instance }})
      description: "{{ $labels.job }} failed to reload runtime config.\n  VALUE = {{ $value }}\n  LABELS = {{ $labels }}"
  - alert: MimirSchedulerQueriesStuck
    expr: sum by (job) (min_over_time(cortex_query_scheduler_queue_length[1m])) > 0
    for: 7m
    labels:
      severity: critical
    annotations:
      summary: Mimir scheduler queries stuck (instance {{ $labels.instance }})
      description: "There are {{ $value }} queued up queries in {{ $labels.job }}.\n  VALUE = {{ $value }}\n  LABELS = {{\
        \ $labels }}"
  - alert: MimirCacheRequestErrors
    expr: (sum by (name, operation, job) (rate(thanos_cache_operation_failures_total[5m])) / sum by (name, operation, job)
      (rate(thanos_cache_operations_total[5m]))) * 100 > 5 and sum by (name, operation, job) (rate(thanos_cache_operations_total[5m]))
      > 0
    for: 5m
    labels:
      severity: warning
    annotations:
      summary: Mimir cache request errors (instance {{ $labels.instance }})
      description: "Mimir cache {{ $labels.name }} is experiencing {{ printf \"%.2f\" $value }}% errors for {{ $labels.operation\
        \ }} operation.\n  VALUE = {{ $value }}\n  LABELS = {{ $labels }}"
  - alert: MimirKvStoreFailure
    expr: (sum by (job, kv_name) (rate(cortex_kv_request_duration_seconds_count{status_code!~"2.."}[5m])) / sum by (job, kv_name)
      (rate(cortex_kv_request_duration_seconds_count[5m]))) == 1 and sum by (job, kv_name) (rate(cortex_kv_request_duration_seconds_count[5m]))
      > 0
    for: 5m
    labels:
      severity: critical
    annotations:
      summary: Mimir KV store failure (instance {{ $labels.instance }})
      description: "Mimir {{ $labels.job }} KV store {{ $labels.kv_name }} is failing with 100% error rate.\n  VALUE = {{\
        \ $value }}\n  LABELS = {{ $labels }}"
  - alert: MimirMemoryMapAreasTooHigh
    expr: process_memory_map_areas{job=~".*(ingester|cortex|mimir|store-gateway).*"} / process_memory_map_areas_limit{job=~".*(ingester|cortex|mimir|store-gateway).*"}
      * 100 > 80 and process_memory_map_areas_limit{job=~".*(ingester|cortex|mimir|store-gateway).*"} > 0
    for: 5m
    labels:
      severity: critical
    annotations:
      summary: Mimir memory map areas too high (instance {{ $labels.instance }})
      description: "Mimir {{ $labels.job }} is using {{ printf \"%.0f\" $value }}% of its memory map area limit.\n  VALUE\
        \ = {{ $value }}\n  LABELS = {{ $labels }}"
  - alert: MimirIngesterInstanceHasNoTenants
    expr: (cortex_ingester_memory_users == 0) and on (instance) (cortex_ingester_memory_users offset 1h > 0)
    for: 1h
    labels:
      severity: warning
    annotations:
      summary: Mimir ingester instance has no tenants (instance {{ $labels.instance }})
      description: "Mimir ingester {{ $labels.instance }} has no tenants assigned.\n  VALUE = {{ $value }}\n  LABELS = {{\
        \ $labels }}"
  - alert: MimirRulerInstanceHasNoRuleGroups
    expr: (cortex_ruler_managers_total == 0) and on (instance) (cortex_ruler_managers_total offset 1h > 0)
    for: 1h
    labels:
      severity: warning
    annotations:
      summary: Mimir ruler instance has no rule groups (instance {{ $labels.instance }})
      description: "Mimir ruler {{ $labels.instance }} has no rule groups assigned.\n  VALUE = {{ $value }}\n  LABELS = {{\
        \ $labels }}"
  - alert: MimirIngestedDataTooFarInTheFuture
    expr: max by (job) (cortex_ingester_tsdb_head_max_timestamp_seconds - time() and cortex_ingester_tsdb_head_max_timestamp_seconds
      > 0) > 3600
    for: 5m
    labels:
      severity: warning
    annotations:
      summary: Mimir ingested data too far in the future (instance {{ $labels.instance }})
      description: "Mimir ingester {{ $labels.job }} has ingested samples with timestamps more than 1 hour in the future.\n\
        \  VALUE = {{ $value }}\n  LABELS = {{ $labels }}"
  - alert: MimirStoreGatewayTooManyFailedOperations
    expr: sum by (job) (rate(thanos_objstore_bucket_operation_failures_total[5m])) > 0.05
    for: 5m
    labels:
      severity: warning
    annotations:
      summary: Mimir store gateway too many failed operations (instance {{ $labels.instance }})
      description: "Mimir store-gateway {{ $labels.job }} bucket operations are failing ({{ $value | humanize }}/s).\n  VALUE\
        \ = {{ $value }}\n  LABELS = {{ $labels }}"
  - alert: MimirRingMembersMismatch
    expr: max by (name, job) (sum by (name, job, instance) (cortex_ring_members)) != min by (name, job) (sum by (name, job,
      instance) (cortex_ring_members))
    for: 15m
    labels:
      severity: warning
    annotations:
      summary: Mimir ring members mismatch (instance {{ $labels.instance }})
      description: "Mimir {{ $labels.name }} ring has inconsistent member counts across instances.\n  VALUE = {{ $value }}\n\
        \  LABELS = {{ $labels }}"
  - alert: MimirIngesterReachingSeriesLimitWarning
    expr: (cortex_ingester_memory_series / ignoring(limit) cortex_ingester_instance_limits{limit="max_series"} * 100 > 80)
      and cortex_ingester_instance_limits{limit="max_series"} > 0
    for: 3h
    labels:
      severity: warning
    annotations:
      summary: Mimir ingester reaching series limit warning (instance {{ $labels.instance }})
      description: "Mimir ingester {{ $labels.instance }} has reached {{ printf \"%.0f\" $value }}% of its series limit.\n\
        \  VALUE = {{ $value }}\n  LABELS = {{ $labels }}"
  - alert: MimirIngesterReachingSeriesLimitCritical
    expr: (cortex_ingester_memory_series / ignoring(limit) cortex_ingester_instance_limits{limit="max_series"} * 100 > 90)
      and cortex_ingester_instance_limits{limit="max_series"} > 0
    for: 5m
    labels:
      severity: critical
    annotations:
      summary: Mimir ingester reaching series limit critical (instance {{ $labels.instance }})
      description: "Mimir ingester {{ $labels.instance }} has reached {{ printf \"%.0f\" $value }}% of its series limit.\n\
        \  VALUE = {{ $value }}\n  LABELS = {{ $labels }}"
  - alert: MimirIngesterReachingTenantsLimitWarning
    expr: (cortex_ingester_memory_users / ignoring(limit) cortex_ingester_instance_limits{limit="max_tenants"} * 100 > 70)
      and cortex_ingester_instance_limits{limit="max_tenants"} > 0
    for: 5m
    labels:
      severity: warning
    annotations:
      summary: Mimir ingester reaching tenants limit warning (instance {{ $labels.instance }})
      description: "Mimir ingester {{ $labels.instance }} has reached {{ printf \"%.0f\" $value }}% of its tenants limit.\n\
        \  VALUE = {{ $value }}\n  LABELS = {{ $labels }}"
  - alert: MimirIngesterReachingTenantsLimitCritical
    expr: (cortex_ingester_memory_users / ignoring(limit) cortex_ingester_instance_limits{limit="max_tenants"} * 100 > 80)
      and cortex_ingester_instance_limits{limit="max_tenants"} > 0
    for: 5m
    labels:
      severity: critical
    annotations:
      summary: Mimir ingester reaching tenants limit critical (instance {{ $labels.instance }})
      description: "Mimir ingester {{ $labels.instance }} has reached {{ printf \"%.0f\" $value }}% of its tenants limit.\n\
        \  VALUE = {{ $value }}\n  LABELS = {{ $labels }}"
  - alert: MimirReachingTcpConnectionsLimit
    expr: cortex_tcp_connections / cortex_tcp_connections_limit * 100 > 80 and cortex_tcp_connections_limit > 0
    for: 5m
    labels:
      severity: critical
    annotations:
      summary: Mimir reaching TCP connections limit (instance {{ $labels.instance }})
      description: "Mimir instance {{ $labels.instance }} is using {{ printf \"%.0f\" $value }}% of its TCP connections limit.\n\
        \  VALUE = {{ $value }}\n  LABELS = {{ $labels }}"
  - alert: MimirDistributorInflightRequestsHigh
    expr: (cortex_distributor_inflight_push_requests / ignoring(limit) cortex_distributor_instance_limits{limit="max_inflight_push_requests"}
      * 100 > 80) and cortex_distributor_instance_limits{limit="max_inflight_push_requests"} > 0
    for: 5m
    labels:
      severity: critical
    annotations:
      summary: Mimir distributor inflight requests high (instance {{ $labels.instance }})
      description: "Mimir distributor {{ $labels.instance }} is using {{ printf \"%.0f\" $value }}% of its inflight push requests\
        \ limit.\n  VALUE = {{ $value }}\n  LABELS = {{ $labels }}"
  - alert: MimirIngesterTsdbHeadCompactionFailed
    expr: rate(cortex_ingester_tsdb_compactions_failed_total[5m]) > 0
    for: 15m
    labels:
      severity: critical
    annotations:
      summary: Mimir ingester TSDB head compaction failed (instance {{ $labels.instance }})
      description: "Mimir ingester {{ $labels.instance }} is failing to compact TSDB head ({{ $value | humanize }}/s).\n \
        \ VALUE = {{ $value }}\n  LABELS = {{ $labels }}"
  - alert: MimirIngesterTsdbHeadTruncationFailed
    expr: rate(cortex_ingester_tsdb_head_truncations_failed_total[5m]) > 0
    for: 1m
    labels:
      severity: critical
    annotations:
      summary: Mimir ingester TSDB head truncation failed (instance {{ $labels.instance }})
      description: "Mimir ingester {{ $labels.instance }} is failing to truncate TSDB head ({{ $value | humanize }}/s).\n\
        \  VALUE = {{ $value }}\n  LABELS = {{ $labels }}"
  - alert: MimirIngesterTsdbCheckpointCreationFailed
    expr: rate(cortex_ingester_tsdb_checkpoint_creations_failed_total[5m]) > 0
    for: 1m
    labels:
      severity: critical
    annotations:
      summary: Mimir ingester TSDB checkpoint creation failed (instance {{ $labels.instance }})
      description: "Mimir ingester {{ $labels.instance }} is failing to create TSDB checkpoints ({{ $value | humanize }}/s).\n\
        \  VALUE = {{ $value }}\n  LABELS = {{ $labels }}"
  - alert: MimirIngesterTsdbCheckpointDeletionFailed
    expr: rate(cortex_ingester_tsdb_checkpoint_deletions_failed_total[5m]) > 0
    for: 1m
    labels:
      severity: critical
    annotations:
      summary: Mimir ingester TSDB checkpoint deletion failed (instance {{ $labels.instance }})
      description: "Mimir ingester {{ $labels.instance }} is failing to delete TSDB checkpoints ({{ $value | humanize }}/s).\n\
        \  VALUE = {{ $value }}\n  LABELS = {{ $labels }}"
  - alert: MimirIngesterTsdbWalTruncationFailed
    expr: rate(cortex_ingester_tsdb_wal_truncations_failed_total[5m]) > 0
    for: 1m
    labels:
      severity: warning
    annotations:
      summary: Mimir ingester TSDB WAL truncation failed (instance {{ $labels.instance }})
      description: "Mimir ingester {{ $labels.instance }} is failing to truncate TSDB WAL ({{ $value | humanize }}/s).\n \
        \ VALUE = {{ $value }}\n  LABELS = {{ $labels }}"
  - alert: MimirIngesterTsdbWalWritesFailed
    expr: rate(cortex_ingester_tsdb_wal_writes_failed_total[1m]) > 0
    for: 3m
    labels:
      severity: critical
    annotations:
      summary: Mimir ingester TSDB WAL writes failed (instance {{ $labels.instance }})
      description: "Mimir ingester {{ $labels.instance }} is failing to write to TSDB WAL ({{ $value | humanize }}/s).\n \
        \ VALUE = {{ $value }}\n  LABELS = {{ $labels }}"
  - alert: MimirStoreGatewayHasNotSyncedBucket
    expr: (time() - cortex_bucket_stores_blocks_last_successful_sync_timestamp_seconds{component="store-gateway"} > 1800)
      and cortex_bucket_stores_blocks_last_successful_sync_timestamp_seconds{component="store-gateway"} > 0
    for: 5m
    labels:
      severity: critical
    annotations:
      summary: Mimir store gateway has not synced bucket (instance {{ $labels.instance }})
      description: "Mimir store-gateway {{ $labels.instance }} has not synced the bucket for more than 10 minutes.\n  VALUE\
        \ = {{ $value }}\n  LABELS = {{ $labels }}"
  - alert: MimirStoreGatewayNoSyncedTenants
    expr: (min by (instance, job) (cortex_bucket_stores_tenants_synced{component="store-gateway"}) == 0) and on (instance)
      (cortex_bucket_stores_tenants_synced{component="store-gateway"} offset 1h > 0)
    for: 1h
    labels:
      severity: warning
    annotations:
      summary: Mimir store gateway no synced tenants (instance {{ $labels.instance }})
      description: "Mimir store-gateway {{ $labels.instance }} has no synced tenants.\n  VALUE = {{ $value }}\n  LABELS =\
        \ {{ $labels }}"
  - alert: MimirBucketIndexNotUpdated
    expr: min by (user, job) (time() - cortex_bucket_index_last_successful_update_timestamp_seconds) > 2100
    for: 1m
    labels:
      severity: critical
    annotations:
      summary: Mimir bucket index not updated (instance {{ $labels.instance }})
      description: "Mimir bucket index for tenant {{ $labels.user }} has not been updated for more than 35 minutes.\n  VALUE\
        \ = {{ $value }}\n  LABELS = {{ $labels }}"
  - alert: MimirCompactorNotCleaningUpBlocks
    expr: (time() - cortex_compactor_block_cleanup_last_successful_run_timestamp_seconds > 21600) and cortex_compactor_block_cleanup_last_successful_run_timestamp_seconds
      > 0
    for: 1h
    labels:
      severity: critical
    annotations:
      summary: Mimir compactor not cleaning up blocks (instance {{ $labels.instance }})
      description: "Mimir compactor {{ $labels.instance }} has not cleaned up blocks in the last 6 hours.\n  VALUE = {{ $value\
        \ }}\n  LABELS = {{ $labels }}"
  - alert: MimirCompactorNotRunningCompaction
    expr: (time() - cortex_compactor_last_successful_run_timestamp_seconds > 86400) and cortex_compactor_last_successful_run_timestamp_seconds
      > 0
    for: 15m
    labels:
      severity: critical
    annotations:
      summary: Mimir compactor not running compaction (instance {{ $labels.instance }})
      description: "Mimir compactor {{ $labels.instance }} has not run compaction in the last 24 hours.\n  VALUE = {{ $value\
        \ }}\n  LABELS = {{ $labels }}"
  - alert: MimirCompactorHasConsecutiveFailures
    expr: increase(cortex_compactor_runs_failed_total{reason!="shutdown"}[2h]) > 1
    for: 1m
    labels:
      severity: critical
    annotations:
      summary: Mimir compactor has consecutive failures (instance {{ $labels.instance }})
      description: "Mimir compactor {{ $labels.instance }} has had {{ $value }} compaction failures in the last 2 hours.\n\
        \  VALUE = {{ $value }}\n  LABELS = {{ $labels }}"
  - alert: MimirCompactorHasRunOutOfDiskSpace
    expr: increase(cortex_compactor_disk_out_of_space_errors_total[24h]) >= 1
    for: 1m
    labels:
      severity: critical
    annotations:
      summary: Mimir compactor has run out of disk space (instance {{ $labels.instance }})
      description: "Mimir compactor {{ $labels.instance }} has run out of disk space.\n  VALUE = {{ $value }}\n  LABELS =\
        \ {{ $labels }}"
  - alert: MimirCompactorHasNotUploadedBlocks
    expr: (time() - thanos_objstore_bucket_last_successful_upload_time{component="compactor"} > 86400) and thanos_objstore_bucket_last_successful_upload_time{component="compactor"}
      > 0
    for: 15m
    labels:
      severity: critical
    annotations:
      summary: Mimir compactor has not uploaded blocks (instance {{ $labels.instance }})
      description: "Mimir compactor {{ $labels.instance }} has not uploaded any block in the last 24 hours.\n  VALUE = {{\
        \ $value }}\n  LABELS = {{ $labels }}"
  - alert: MimirCompactorSkippedBlocks
    expr: increase(cortex_compactor_blocks_marked_for_no_compaction_total[24h]) > 0
    for: 5m
    labels:
      severity: warning
    annotations:
      summary: Mimir compactor skipped blocks (instance {{ $labels.instance }})
      description: "Mimir compactor has found {{ $value }} blocks that cannot be compacted (reason {{ $labels.reason }}).\n\
        \  VALUE = {{ $value }}\n  LABELS = {{ $labels }}"
  - alert: MimirRulerTooManyFailedPushes
    expr: 100 * sum by (instance, job) (rate(cortex_ruler_write_requests_failed_total[5m])) / sum by (instance, job) (rate(cortex_ruler_write_requests_total[5m]))
      > 1 and sum by (instance, job) (rate(cortex_ruler_write_requests_total[5m])) > 0
    for: 5m
    labels:
      severity: critical
    annotations:
      summary: Mimir ruler too many failed pushes (instance {{ $labels.instance }})
      description: "Mimir ruler {{ $labels.instance }} is failing to push {{ printf \"%.2f\" $value }}% of write requests.\n\
        \  VALUE = {{ $value }}\n  LABELS = {{ $labels }}"
  - alert: MimirRulerTooManyFailedQueries
    expr: 100 * sum by (instance, job) (rate(cortex_ruler_queries_failed_total[5m])) / sum by (instance, job) (rate(cortex_ruler_queries_total[5m]))
      > 1 and sum by (instance, job) (rate(cortex_ruler_queries_total[5m])) > 0
    for: 5m
    labels:
      severity: critical
    annotations:
      summary: Mimir ruler too many failed queries (instance {{ $labels.instance }})
      description: "Mimir ruler {{ $labels.instance }} is failing {{ printf \"%.2f\" $value }}% of query evaluations.\n  VALUE\
        \ = {{ $value }}\n  LABELS = {{ $labels }}"
  - alert: MimirRulerMissedEvaluations
    expr: 100 * sum by (instance, job) (rate(cortex_prometheus_rule_group_iterations_missed_total[5m])) / sum by (instance,
      job) (rate(cortex_prometheus_rule_group_iterations_total[5m])) > 1 and sum by (instance, job) (rate(cortex_prometheus_rule_group_iterations_total[5m]))
      > 0
    for: 5m
    labels:
      severity: warning
    annotations:
      summary: Mimir ruler missed evaluations (instance {{ $labels.instance }})
      description: "Mimir ruler {{ $labels.instance }} is missing {{ printf \"%.2f\" $value }}% of rule group evaluations.\n\
        \  VALUE = {{ $value }}\n  LABELS = {{ $labels }}"
