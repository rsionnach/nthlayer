    expr: sum by (job) (rate(cortex_ruler_ring_check_errors_total[5m])) > 0.05
    for: 5m
    labels:
      severity: critical
    annotations:
      summary: Mimir ruler failed ring check (instance {{ $labels.instance }})
      description: "Mimir ruler {{ $labels.job }} is failing ring checks ({{ $value | humanize }}/s).\n  VALUE = {{ $value\
        \ }}\n  LABELS = {{ $labels }}"
