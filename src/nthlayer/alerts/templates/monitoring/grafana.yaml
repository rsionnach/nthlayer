      description: "Mimir alertmanager {{ $labels.instance }} has no tenants assigned.\n  VALUE = {{ $value }}\n  LABELS =\
        \ {{ $labels }}"
  - alert: MimirGossipMembersCountTooHigh
    expr: avg(memberlist_client_cluster_members_count{job=~".*(mimir|cortex).*"}) by (job) * 1.15 + 10 < max(memberlist_client_cluster_members_count{job=~".*(mimir|cortex).*"})
      by (job)
    for: 20m
    labels:
      severity: warning
    annotations:
      summary: Mimir gossip members count too high (instance {{ $labels.instance }})
      description: "Mimir gossip cluster has more members than expected.\n  VALUE = {{ $value }}\n  LABELS = {{ $labels }}"
  - alert: MimirGossipMembersCountTooLow
    expr: avg(memberlist_client_cluster_members_count{job=~".*(mimir|cortex).*"}) by (job) * 0.5 > min(memberlist_client_cluster_members_count{job=~".*(mimir|cortex).*"})
      by (job)
    for: 20m
    labels:
      severity: warning
    annotations:
      summary: Mimir gossip members count too low (instance {{ $labels.instance }})
      description: "Mimir gossip cluster has fewer members than expected.\n  VALUE = {{ $value }}\n  LABELS = {{ $labels }}"
