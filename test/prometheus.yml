global:
  scrape_interval: 5s
  evaluation_interval: 5s

rule_files:
  - /etc/prometheus/rules/*.yaml
  - /etc/prometheus/rules/*.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

scrape_configs:
  - job_name: fake-services
    static_configs:
      - targets:
          - host.docker.internal:8001
          - host.docker.internal:8002
          - host.docker.internal:8003
          - host.docker.internal:8004
          - host.docker.internal:8005
          - host.docker.internal:8006
          - host.docker.internal:8007
          - host.docker.internal:8008
    relabel_configs:
      - source_labels: [__address__]
        regex: '.*:(\d+)'
        target_label: instance

  - job_name: nthlayer-respond
    static_configs:
      - targets:
          - host.docker.internal:8090
